<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>H7K IA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:       #0a84ff;
    --blue-dim:   #0055cc;
    --blue-glow:  rgba(10,132,255,0.18);
    --blue-soft:  rgba(10,132,255,0.10);
    --bg:         #000000;
    --bg2:        #0a0a0f;
    --bg3:        #111118;
    --surface:    #18181f;
    --surface2:   #1e1e28;
    --border:     rgba(255,255,255,0.07);
    --text:       #ffffff;
    --text2:      #aaaab8;
    --text3:      #55556a;
    --green:      #30d158;
    --radius:     20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ══════════════════════════════════════
     SCREENS
  ══════════════════════════════════════ */
  .screen {
    display: none;
    flex-direction: column;
    height: 100%;
    animation: fadeIn 0.3s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ══════════════════════════════════════
     SCREEN 1 — HOME (lista de chats)
  ══════════════════════════════════════ */
  #screen-home {
    background: var(--bg);
  }

  .home-header {
    padding: 56px 20px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .home-brand h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .home-brand h1 span { color: var(--blue); }

  .home-brand p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 3px;
    font-weight: 400;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-green 2s ease-in-out infinite;
  }

  @keyframes pulse-green {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* divider */
  .home-divider {
    height: 1px;
    background: var(--border);
    margin: 0 20px;
  }

  /* empty state */
  .home-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 40px 20px;
  }

  .ai-icon-big {
    width: 90px; height: 90px;
    border-radius: 26px;
    background: radial-gradient(circle at 35% 35%, #1a0a0a, #0d0005 60%, #050010);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 8px 40px rgba(10,132,255,0.25);
    border: 1px solid rgba(10,132,255,0.2);
  }

  .ai-icon-big::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 27px;
    background: linear-gradient(135deg, rgba(10,132,255,0.3), transparent 50%);
    pointer-events: none;
  }

  .bolt {
    font-size: 38px;
    filter: drop-shadow(0 0 12px var(--blue));
    animation: boltPulse 3s ease-in-out infinite;
  }

  @keyframes boltPulse {
    0%,100% { filter: drop-shadow(0 0 8px var(--blue)); }
    50% { filter: drop-shadow(0 0 22px var(--blue)) drop-shadow(0 0 40px rgba(10,132,255,0.4)); }
  }

  .home-empty h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .home-empty p {
    font-size: 14px;
    color: var(--text2);
    text-align: center;
    line-height: 1.5;
    max-width: 240px;
  }

  /* conversation list */
  .conv-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .conv-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }

  .conv-item:hover, .conv-item:active {
    background: var(--surface);
  }

  .conv-avatar {
    width: 46px; height: 46px;
    border-radius: 14px;
    background: radial-gradient(circle at 35% 35%, #0d0520, #050010);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    border: 1px solid rgba(10,132,255,0.2);
    box-shadow: 0 0 12px rgba(10,132,255,0.12);
  }

  .conv-info { flex: 1; min-width: 0; }

  .conv-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .conv-preview {
    font-size: 13px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conv-time {
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
  }

  /* new conversation button */
  .btn-new-conv {
    margin: 16px 20px 32px;
    padding: 17px;
    background: var(--blue);
    border: none;
    border-radius: 16px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(10,132,255,0.35);
    flex-shrink: 0;
  }

  .btn-new-conv:hover {
    background: #1a90ff;
    box-shadow: 0 6px 30px rgba(10,132,255,0.5);
    transform: translateY(-1px);
  }

  .btn-new-conv:active { transform: scale(0.98); }

  /* ══════════════════════════════════════
     SCREEN 2 — CHAT
  ══════════════════════════════════════ */
  #screen-chat {
    background: var(--bg2);
  }

  .chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 52px 16px 14px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .btn-back {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: none;
    color: var(--blue);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .btn-back:hover { background: var(--surface2); }

  .chat-header-info { flex: 1; }

  .chat-header-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    margin-bottom: 1px;
  }

  .chat-header-sub {
    font-size: 11px;
    color: var(--blue);
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .chat-header-sub::before {
    content: '';
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
  }

  /* messages area */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 0; }

  /* welcome inside chat */
  .chat-welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 30px 0 10px;
  }

  .ai-icon-sm {
    width: 64px; height: 64px;
    border-radius: 18px;
    background: radial-gradient(circle at 35% 35%, #0d0520, #050010);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    border: 1px solid rgba(10,132,255,0.2);
    box-shadow: 0 4px 20px rgba(10,132,255,0.2);
  }

  .chat-welcome h3 {
    font-size: 17px;
    font-weight: 700;
  }

  .chat-welcome h3 span { color: var(--blue); }

  .chat-welcome p {
    font-size: 13px;
    color: var(--text2);
    text-align: center;
    max-width: 220px;
    line-height: 1.5;
  }

  /* message bubbles */
  .msg {
    display: flex;
    gap: 8px;
    max-width: 88%;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai   { align-self: flex-start; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: radial-gradient(circle at 35% 35%, #0d0520, #050010);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    border: 1px solid rgba(10,132,255,0.2);
    margin-top: 2px;
  }

  .msg-bubble {
    padding: 11px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
  }

  .msg.user .msg-bubble {
    background: var(--blue);
    color: #fff;
    border-bottom-right-radius: 5px;
  }

  .msg.ai .msg-bubble {
    background: var(--surface);
    color: var(--text);
    border-bottom-left-radius: 5px;
    border: 1px solid var(--border);
  }

  /* typing indicator */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 5px;
    width: fit-content;
  }

  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text2);
    animation: typingDot 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%,80%,100% { transform: scale(1); opacity: 0.4; }
    40% { transform: scale(1.3); opacity: 1; }
  }

  /* input bar */
  .chat-input-bar {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 12px 16px 28px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 11px 16px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: rgba(10,132,255,0.4);
    box-shadow: 0 0 0 3px rgba(10,132,255,0.08);
  }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.4;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
  }

  #msg-input::placeholder { color: var(--text3); }
  #msg-input::-webkit-scrollbar { display: none; }

  .btn-send {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--blue);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(10,132,255,0.35);
  }

  .btn-send:hover { background: #1a90ff; transform: scale(1.05); }
  .btn-send:active { transform: scale(0.95); }
  .btn-send:disabled { background: var(--surface2); box-shadow: none; cursor: default; }

  /* scrollbar for messages */
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     SCREEN 1: HOME
═══════════════════════════════════════ -->
<div id="screen-home" class="screen active">

  <div class="home-header">
    <div class="home-brand">
      <h1>H7K <span>IA</span></h1>
      <p>Empieza tu primera conversación</p>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      En línea
    </div>
  </div>

  <div class="home-divider"></div>

  <!-- empty / conversation list -->
  <div id="home-body" class="home-empty">
    <div class="ai-icon-big">
      <span class="bolt">⚡</span>
    </div>
    <h2>Sin conversaciones</h2>
    <p>Toca el botón para comenzar a chatear con H7K IA</p>
  </div>

  <button class="btn-new-conv" onclick="newConversation()">
    + &nbsp;Nueva conversación
  </button>
</div>

<!-- ═══════════════════════════════════════
     SCREEN 2: CHAT
═══════════════════════════════════════ -->
<div id="screen-chat" class="screen">

  <div class="chat-header">
    <button class="btn-back" onclick="goHome()">‹</button>
    <div class="chat-header-info">
      <div class="chat-header-title">H7K IA</div>
      <div class="chat-header-sub">En línea</div>
    </div>
    <div style="width:36px"></div>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div class="chat-welcome">
      <div class="ai-icon-sm">⚡</div>
      <h3>H7K <span>IA</span></h3>
      <p>¿En qué te puedo ayudar hoy?</p>
    </div>
  </div>

  <div class="chat-input-bar">
    <div class="input-wrap">
      <textarea
        id="msg-input"
        rows="1"
        placeholder="Escribe un mensaje..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="btn-send" id="btn-send" onclick="sendMessage()">↑</button>
  </div>

</div>

<script>
  // ─── STATE ───────────────────────────────────────────────
  const conversations = [];
  let currentConv = null;
  let isLoading = false;

  // ─── NAVIGATION ──────────────────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goHome() {
    updateHomeBody();
    showScreen('screen-home');
  }

  function newConversation() {
    const conv = {
      id: Date.now(),
      title: 'Nueva conversación',
      messages: [],
      preview: 'Toca para empezar',
      time: formatTime(new Date()),
    };
    conversations.unshift(conv);
    openConversation(conv);
  }

  function openConversation(conv) {
    currentConv = conv;
    renderMessages();
    showScreen('screen-chat');
    setTimeout(() => {
      document.getElementById('msg-input').focus();
    }, 300);
  }

  // ─── HOME BODY ───────────────────────────────────────────
  function updateHomeBody() {
    const body = document.getElementById('home-body');
    if (conversations.length === 0) {
      body.className = 'home-empty';
      body.innerHTML = `
        <div class="ai-icon-big"><span class="bolt">⚡</span></div>
        <h2>Sin conversaciones</h2>
        <p>Toca el botón para comenzar a chatear con H7K IA</p>
      `;
      return;
    }
    body.className = 'conv-list';
    body.innerHTML = conversations.map(c => `
      <div class="conv-item" onclick='openConvById(${c.id})'>
        <div class="conv-avatar">⚡</div>
        <div class="conv-info">
          <div class="conv-name">${escHtml(c.title)}</div>
          <div class="conv-preview">${escHtml(c.preview)}</div>
        </div>
        <div class="conv-time">${c.time}</div>
      </div>
    `).join('');
  }

  function openConvById(id) {
    const conv = conversations.find(c => c.id === id);
    if (conv) openConversation(conv);
  }

  // ─── RENDER MESSAGES ─────────────────────────────────────
  function renderMessages() {
    const container = document.getElementById('chat-messages');
    container.innerHTML = `
      <div class="chat-welcome">
        <div class="ai-icon-sm">⚡</div>
        <h3>H7K <span style="color:var(--blue)">IA</span></h3>
        <p>¿En qué te puedo ayudar hoy?</p>
      </div>
    `;
    currentConv.messages.forEach(m => appendBubble(m.role, m.content, false));
    scrollBottom();
  }

  function appendBubble(role, text, animate = true) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
    if (!animate) div.style.animation = 'none';

    const avatar = role === 'assistant'
      ? `<div class="msg-avatar">⚡</div>`
      : '';

    div.innerHTML = `
      ${avatar}
      <div class="msg-bubble">${formatMsg(text)}</div>
    `;
    container.appendChild(div);
    scrollBottom();
    return div;
  }

  function showTyping() {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing-msg';
    div.innerHTML = `
      <div class="msg-avatar">⚡</div>
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    container.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing-msg');
    if (t) t.remove();
  }

  // ─── SEND MESSAGE ─────────────────────────────────────────
  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);

    // add user message
    currentConv.messages.push({ role: 'user', content: text });
    appendBubble('user', text);
    updateConvMeta(text);

    // update title after first message
    if (currentConv.messages.length === 1) {
      currentConv.title = text.length > 30 ? text.slice(0, 30) + '…' : text;
    }

    isLoading = true;
    document.getElementById('btn-send').disabled = true;
    showTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'Eres H7K IA, un asistente inteligente del hub H7K. Responde siempre en español de forma clara, amigable y concisa. Eres experto en Roblox, scripts, gaming y tecnología.',
          messages: currentConv.messages,
        }),
      });

      const data = await response.json();
      removeTyping();

      const reply = data.content?.[0]?.text || 'Lo siento, no pude procesar tu mensaje.';
      currentConv.messages.push({ role: 'assistant', content: reply });
      appendBubble('assistant', reply);
      updateConvMeta(reply);

    } catch (err) {
      removeTyping();
      const errMsg = 'Error de conexión. Verifica tu internet e intenta de nuevo.';
      appendBubble('assistant', errMsg);
    }

    isLoading = false;
    document.getElementById('btn-send').disabled = false;
    input.focus();
  }

  function updateConvMeta(lastText) {
    currentConv.preview = lastText.length > 40 ? lastText.slice(0, 40) + '…' : lastText;
    currentConv.time = formatTime(new Date());
  }

  // ─── HELPERS ─────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function scrollBottom() {
    const c = document.getElementById('chat-messages');
    c.scrollTop = c.scrollHeight;
  }

  function formatTime(d) {
    return d.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatMsg(text) {
    return escHtml(text)
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`(.*?)`/g, '<code style="background:rgba(255,255,255,0.1);padding:1px 5px;border-radius:4px;font-size:12px">$1</code>')
      .replace(/\n/g, '<br>');
  }
</script>

</body>
</html>
